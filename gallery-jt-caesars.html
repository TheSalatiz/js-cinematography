      .reveal { opacity: 0; transform: translateY(40px); transition: opacity 0.8s ease, transform 0.8s ease; }
      .reveal.active { opacity: 1; transform: translateY(0); }
      
      .back-link { display: inline-flex; align-items: center; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; font-size: 0.85rem; color: var(--text-main); transition: color 0.3s ease; margin-bottom: 2rem; }
      .back-link::before { content: '←'; margin-right: 0.5rem; transition: transform 0.3s ease; }
      .back-link:hover { color: var(--accent-color); }
      .back-link:hover::before { transform: translateX(-5px); }

      /* Filter Menu CSS */
      .filter-menu { display: flex; flex-wrap: wrap; justify-content: center; gap: 1.5rem; margin-bottom: 3rem; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 1rem; }
      .filter-btn { background: none; border: none; font-family: 'DM Sans', sans-serif; text-transform: uppercase; letter-spacing: 0.15em; font-size: 0.85rem; font-weight: 600; color: #9CA3AF; cursor: pointer; transition: all 0.3s ease; padding-bottom: 0.5rem; position: relative; outline: none; }
      .filter-btn:hover { color: var(--text-main); }
      .filter-btn.active { color: var(--text-main); }
      .filter-btn.active::after { content: ''; position: absolute; bottom: -1rem; left: 0; width: 100%; height: 2px; background-color: var(--accent-color); }

      /* Gallery Layout CSS */

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const menuButton = document.getElementById('mobile-menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');
        if(menuButton && mobileMenu) {
          menuButton.addEventListener('click', () => {
            mobileMenu.classList.toggle('open');
            if (mobileMenu.classList.contains('open')) { mobileMenu.style.maxHeight = '500px'; mobileMenu.style.opacity = '1'; }
            else { mobileMenu.style.maxHeight = '0'; mobileMenu.style.opacity = '0'; }
          });
        }
        
        const nav = document.getElementById('main-nav');
        window.addEventListener('scroll', () => {
          if (window.scrollY > 50) nav.classList.add('nav-scroll'); else nav.classList.remove('nav-scroll');
        });

        const observer = new IntersectionObserver((entries) => {
          entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('[data-animate]').forEach(el => observer.observe(el));

        // Pixieset-style Filtering Logic
        const filterBtns = document.querySelectorAll('.filter-btn');
        const galleryItems = document.querySelectorAll('.gallery-item');

        filterBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                filterBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const filterValue = btn.getAttribute('data-filter');
                
                galleryItems.forEach(item => {
                    if (filterValue === 'all' || item.getAttribute('data-category') === filterValue) {
                        item.classList.remove('hidden');
                    } else {
                        item.classList.add('hidden');
                    }
                });
            });
        });
      });
    </script>
