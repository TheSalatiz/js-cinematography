<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Work | Juan Salazar Cinema</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
      :root { --accent-color: #5E6C58; --secondary-color: #D9C5B2; --bg-color: #FAFAF9; --text-main: #2C2C2C; }
      body { font-family: 'DM Sans', sans-serif; background-color: var(--bg-color); color: var(--text-main); -webkit-font-smoothing: antialiased; scroll-behavior: smooth; margin: 0; padding: 0; }
      h1, h2, h3, h4, .font-bold.tracking-wider { font-family: 'Playfair Display', serif; }

      /* Navigation */
      #main-nav { transition: background-color 0.4s ease, backdrop-filter 0.4s ease; }
      .nav-scroll { background-color: rgba(250, 250, 249, 0.95) !important; backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0, 0, 0, 0.05); }
      .menu-item a, .menu-item button { position: relative; transition: color 0.3s ease; color: var(--text-main); }
      .menu-item a.active-link { font-weight: 700; color: var(--accent-color); }
      .menu-item a:after, .menu-item button:after { content: ''; position: absolute; bottom: -6px; left: 0; width: 0%; height: 2px; background-color: var(--accent-color); transition: width 0.3s ease; }
      .menu-item a:hover:after, .menu-item button:hover:after { width: 100%; }

      /* Split Hub Layout */
      .hub-container { display: flex; flex-direction: column; min-height: 100vh; }
      @media (min-width: 768px) { .hub-container { flex-direction: row; } }
      
      .hub-half {
        flex: 1; position: relative; display: flex; align-items: center; justify-content: center;
        overflow: hidden; cursor: pointer; min-height: 50vh; text-decoration: none;
      }
      .hub-bg {
        position: absolute; inset: 0; background-size: cover; background-position: center;
        transition: transform 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }
      .hub-overlay {
        position: absolute; inset: 0; background: rgba(0, 0, 0, 0.4); transition: background 0.4s ease;
      }
      
      .hub-half:hover .hub-bg { transform: scale(1.05); }
      .hub-half:hover .hub-overlay { background: rgba(0, 0, 0, 0.2); }
      
      .hub-content {
        position: relative; z-index: 10; text-align: center; color: #FFFFFF; padding: 2rem;
        transition: transform 0.4s ease;
      }
      .hub-half:hover .hub-content { transform: translateY(-10px); }
      
      .hub-title { font-size: 3.5rem; font-weight: 700; margin-bottom: 1rem; text-shadow: 0 4px 20px rgba(0,0,0,0.5); }
      .hub-subtitle { font-family: 'DM Sans', sans-serif; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 0.2em; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
      
      /* Mobile Menu & Buttons */
      .cta-button-round { display: inline-flex; align-items: center; justify-content: center; background: transparent; color: var(--text-main); border: 1px solid var(--text-main); border-radius: 999px; font-weight: 500; font-size: 1.05rem; letter-spacing: 0.05em; text-transform: uppercase; padding: 1em 2.2em; cursor: pointer; transition: all 0.3s ease; }
      .cta-button-round:hover { color: #fff; background-color: var(--accent-color); border-color: var(--accent-color); transform: translateY(-2px); }
      .cta-button-round svg { transition: transform 0.4s; margin-left: 0.3em; width: 1.15em; height: 1.15em; }
      .cta-button-round:hover svg { transform: translateX(4px); }
      #mobile-menu { transition: max-height 0.4s ease, opacity 0.3s; max-height: 0; opacity: 0; overflow: hidden; display: block; }
      #mobile-menu.open { max-height: 500px; opacity: 1; }
    </style>
</head>
<body>
    <nav id="main-nav" class="fixed top-0 w-full z-50 bg-transparent nav-scroll">
      <div class="max-w-7xl mx-auto px-6 py-5 flex items-center justify-between">
        <a href="index.html" class="text-xl font-bold tracking-wider" style="font-family: 'Playfair Display', serif;">Juan Salazar Cinema</a>
        <button id="mobile-menu-toggle" class="md:hidden text-gray-800 focus:outline-none" aria-label="Toggle menu">
            <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m4 18h16"></path></svg>
        </button>
        <ul class="hidden md:flex items-center space-x-10 text-sm uppercase font-medium tracking-widest">
            <li class="menu-item"><a href="index.html">Home</a></li>
            <li class="menu-item"><a href="about.html">About Me</a></li>
            <li class="menu-item"><a href="videography.html">Videography</a></li>
            <li class="menu-item"><a href="photography.html">Photography</a></li>
            <li class="menu-item">
              <a href="index.html#contact" class="cta-button-round" style="padding: 0.7em 1.5em; min-width: 0; min-height: 0;">Start Your Story</a>
            </li>
        </ul>
      </div>
      <ul id="mobile-menu" class="md:hidden bg-white border-b border-gray-100 px-6 py-4 space-y-2 text-gray-800 shadow-lg">
          <li><a href="index.html" class="block py-2">Home</a></li>
          <li><a href="about.html" class="block py-2">About Me</a></li>
          <li><a href="videography.html" class="block py-2">Videography</a></li>
          <li><a href="photography.html" class="block py-2">Photography</a></li>
      </ul>
    </nav>

    <div class="hub-container">
        <a href="videography.html" class="hub-half">
            <div class="hub-bg" style="background-image: url('https://images.unsplash.com/photo-1606800052052-a08af7148866?q=80&w=2070&auto=format&fit=crop');"></div>
            <div class="hub-overlay"></div>
            <div class="hub-content">
                <h2 class="hub-title">Videography</h2>
                <span class="hub-subtitle">Cinematic Films</span>
            </div>
        </a>

        <a href="photography.html" class="hub-half">
            <div class="hub-bg" style="background-image: url('DSC00956-min.jpg');"></div>
            <div class="hub-overlay"></div>
            <div class="hub-content">
                <h2 class="hub-title">Photography</h2>
                <span class="hub-subtitle">Editorial Galleries</span>
            </div>
        </a>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const menuButton = document.getElementById('mobile-menu-toggle');
        const mobileMenu = document.getElementById('mobile-menu');
        if(menuButton && mobileMenu) {
          menuButton.addEventListener('click', () => {
            mobileMenu.classList.toggle('open');
            if (mobileMenu.classList.contains('open')) { mobileMenu.style.maxHeight = '500px'; mobileMenu.style.opacity = '1'; }
            else { mobileMenu.style.maxHeight = '0'; mobileMenu.style.opacity = '0'; }
          });
        }
      });
    </script>
</body>
</html>
